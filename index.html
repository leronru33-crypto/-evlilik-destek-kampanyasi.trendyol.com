<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Security Test</title>
    <style>
        body{
            margin:0;
            background:#111;
            color:#fff;
            display:flex;
            justify-content:center;
            align-items:center;
            height:100vh;
            font-family:Arial,sans-serif;
        }
        .box{
            text-align:center;
            border:2px solid #00ff99;
            padding:40px;
            border-radius:15px;
            box-shadow:0 0 20px #00ff99;
        }
        h1{
            color:#00ff99;
        }
    </style>
</head>
<body>
    <div class="box">
        <h1>Security Test Page</h1>
        <p>This page is displayed as proof of a successful security assessment.</p>
        <p>No data was modified or accessed.</p>
        <hr>
        <small>Reported through the responsible disclosure / bug bounty program.</small>
    </div>
</body>
</html>
